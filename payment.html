<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAURAV AI SERVICES | Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-4xl px-4 py-10 md:px-6">
    <section class="card">
      <h1 class="text-3xl font-bold">Payment & Confirmation</h1>
      <div id="payment-content" class="mt-6 space-y-4"></div>
      <p class="mt-4 text-slate-300">Make payment using the displayed QR code and take a screenshot of successful transaction.</p>
      <button id="whatsapp-btn" class="mt-6 w-full rounded-xl bg-green-600 px-5 py-3 font-semibold hover:bg-green-500">Confirm &amp; Send Details to WhatsApp</button>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
