<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAURAV AI SERVICES | Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-4xl px-4 py-10 md:px-6">
    <section class="card">
      <h1 class="text-3xl font-bold">Checkout Form</h1>
      <form id="checkout-form" class="mt-6 grid gap-4 md:grid-cols-2">
        <label class="md:col-span-2">Name
          <input id="name" type="text" class="input" placeholder="Full name" required />
        </label>

        <label>Country
          <select id="country" class="input" required></select>
        </label>

        <label>State
          <select id="state" class="input" required></select>
        </label>

        <label>City
          <input id="city" type="text" class="input" required />
        </label>

        <label>WhatsApp No
          <div class="flex gap-2">
            <select id="country-code" class="input w-28" required>
              <option value="+91">+91</option>
              <option value="+1">+1</option>
              <option value="+44">+44</option>
              <option value="+971">+971</option>
            </select>
            <input id="whatsapp" type="tel" class="input" required />
          </div>
        </label>

        <label class="md:col-span-2">Email
          <input id="email" type="email" class="input" required />
        </label>

        <button type="submit" class="btn-primary md:col-span-2">Submit Details</button>
      </form>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
